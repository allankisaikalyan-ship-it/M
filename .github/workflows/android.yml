name: Build Omni AI APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip + Show everything
        run: |
          unzip -o "omniai-final.zip"
          echo "========== ALL FILES =========="
          ls -la
          echo "========== SEARCH gradlew =========="
          find . -type f -name "gradlew" 2>/dev/null || echo "gradlew NOT FOUND"

      - name: Build only if gradlew exists
        run: |
          if [ ! -f gradlew ]; then
            echo "ERROR: gradlew missing. Your zip must be exported from AI Studio"
            exit 1
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      
      - uses: actions/upload-artifact@v4
        with:
          name: OmniAI-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
