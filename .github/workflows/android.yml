name: Build Omni AI APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip + Show structure
        run: |
          unzip -o "omniai (3).zip"
          echo "=== ALL FILES AFTER UNZIP ==="
          ls -la
          find . -maxdepth 2 -type f -name "gradlew"

      - name: Find gradlew folder
        id: find_root
        run: |
          DIR=$(dirname $(find . -name "gradlew" -type f -print -quit))
          echo "Project dir: $DIR"
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Make gradlew executable + Build
        run: |
          chmod +x ${{ steps.find_root.outputs.dir }}/gradlew
          ${{ steps.find_root.outputs.dir }}/gradlew assembleDebug --stacktrace
      
      - uses: actions/upload-artifact@v4
        with:
          name: OmniAI-debug
          path: ${{ steps.find_root.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
