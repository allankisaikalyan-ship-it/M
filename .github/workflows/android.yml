name: Build Omni AI APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Unzip + Fix folder structure
        run: |
          unzip -o "omniai (4).zip"
          echo "=== BEFORE FIX ==="
          ls -la
          
          # If gradlew is inside a subfolder, move everything up
          if [ -f ./*/gradlew ]; then
            echo "Found nested folder, moving files up..."
            mv ./*/gradlew .
            mv ./*/gradlew.bat .
            mv ./*/settings.gradle.kts .
            mv ./*/build.gradle.kts .
            mv ./*/app . 2>/dev/null || true
            mv ./*/gradle . 2>/dev/null || true
          fi
          
          echo "=== AFTER FIX ==="
          ls -la

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      
      - uses: actions/upload-artifact@v4
        with:
          name: OmniAI-debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
